[build]
  publish = "."
  command = "node scripts/netlify-config.mjs"

# Landing del frontend en la raíz; el mapa Mapbox sigue en /index.html (iframe)
[[redirects]]
  from = "/"
  to = "/frontend/"
  status = 302
  force = true

[[redirects]]
  from = "/frontend"
  to = "/frontend/"
  status = 302
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
